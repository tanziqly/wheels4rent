version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: wheels4rent
      POSTGRES_USER: wheels
      POSTGRES_PASSWORD: wheels_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U wheels -d wheels4rent']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./wheels-backend
      dockerfile: Dockerfile
    restart: unless-stopped
    network_mode: host
    environment:
      DATABASE_URL: postgresql://wheels:wheels_pass@localhost:5432/wheels4rent
      JWT_SECRET: ${JWT_SECRET:-wheels4rent-super-secret-change-in-prod}
      ADMIN_LOGIN: ${ADMIN_LOGIN:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-wheels4rent}
      PORT: 3001
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_ADMIN_CHAT_ID: ${TELEGRAM_ADMIN_CHAT_ID}
      TELEGRAM_PROXY_URL: ${TELEGRAM_PROXY_URL:-}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./wheels4rent
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
    ports:
      - '3000:3000'
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads_data:
